# ClawHub 配置（CLI 模式）
# 注意：使用 CLI 模式时，不需要 API Key
# 请先运行 `clawhub login` 进行 OAuth 认证
clawhub:
  # 发布者句柄（可选）：指定skill发布到哪个组织或用户下
  # 例如: "your-org-handle" 或 "your-username"
  owner: ""

# GitHub 配置
github:
  # 仓库所有者
  owner: ""
  # 仓库名称（只填写仓库名，不包含 URL）
  repo: ""
  # 分支名称
  branch: ""
  # GitHub个人访问令牌（可选，用于私有仓库或提高API限制）
  # 创建方式: GitHub Settings -> Developer settings -> Personal access tokens
  token: ""

# 发布模式：batch（批量发布）或 monitor（监控发布）
mode: "monitor"

# 日志级别：DEBUG, INFO, WARNING, ERROR
log_level: "INFO"

# AI Changelog 生成配置（可选）
# 启用后，监控模式将通过 AI 大模型分析代码变更 diff 自动生成 changelog
ai:
  # 是否启用 AI changelog 生成功能
  enabled: false
  # LLM 服务提供商：openai, azure_openai, deepseek, zhipu, ollama, ark, volcengine, custom
  provider: "openai"
  # API Key，支持环境变量引用格式 ${env:VAR_NAME}
  api_key: "${env:OPENAI_API_KEY}"
  # 模型名称
  model: "gpt-4"
  # 自定义 API 端点（provider 为 custom 时必填）
  api_base: ""
  # 响应最大 token 数
  max_tokens: 1024
  # 生成温度参数（0.0-1.0，越低越确定）
  temperature: 0.3
  # API 调用超时时间（秒）
  timeout: 20
  # 临时性错误最大重试次数
  max_retries: 3

# Agent 配置（可选，需要 ai.enabled 为 true）
agent:
  # 是否启用 Agent 自主决策能力
  enabled: false
  # Agent 最大迭代次数
  max_iterations: 5
  # 自定义提示词模板文件路径
  prompt_template: ""
  # Agent 可用工具列表
  tools: []
